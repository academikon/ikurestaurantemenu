<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKU | Menú Interactivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <aside class="hero">
            <div class="hero-inner">
                <span class="overline">Bienvenidos a</span>
                <h1>IKU</h1>
                <p class="brand-sub">RESTAURANTE BAR</p>
                <div class="info-box">
                    <p class="location">📍 Pueblo Bello, Cesar</p>
                    <p class="schedule">Lun - Dom: 11:00 AM - 10:00 PM</p>
                </div>
            </div>
        </aside>

        <main class="menu-content">
            <nav class="tabs">
                <button class="tab-btn active" data-tab="diario">Menú del Día</button>
                <button class="tab-btn" data-tab="rapida">Comidas Rápidas</button>
                <button class="tab-btn" data-tab="varios">Varios</button>
            </nav>

            <div id="loader" class="loader">Preparando el menú...</div>

            <section id="diario" class="menu-section active"></section>
            <section id="rapida" class="menu-section"></section>
            <section id="varios" class="menu-section"></section>
        </main>
    </div>

    <div class="cart-fab" onclick="toggleCart()">
        <span id="cart-count">0</span>🛒
    </div>

    <div id="cart-modal" class="cart-modal">
        <div class="cart-header">
            <h3>Tu Pedido</h3>
            <button class="close-cart" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items-list" id="cart-items"></div>
        <div class="cart-footer">
            <div class="total-row"><span>Total:</span><span id="cart-total-price">$0</span></div>
            <div class="order-form">
                <select id="tipo-servicio" onchange="ajustarPlaceholder()">
                    <option value="mesa">🍽️ Mesa (Comer aquí)</option>
                    <option value="domicilio">🛵 Domicilio</option>
                </select>
                <input type="text" id="nombre-cliente" placeholder="Nombre y # de Mesa">
                <div class="whatsapp-check">
                    <input type="checkbox" id="check-whatsapp">
                    <label for="check-whatsapp">Respaldo por <strong>WhatsApp</strong></label>
                </div>
            </div>
            <button class="btn-send-order" onclick="enviarPedido()">CONFIRMAR PEDIDO</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script>
        function ajustarPlaceholder() {
            const tipo = document.getElementById('tipo-servicio').value;
            const input = document.getElementById('nombre-cliente');
            const checkWA = document.getElementById('check-whatsapp');
            
            // Ajustar texto del placeholder
            input.placeholder = (tipo === 'mesa') ? "Nombre y # de Mesa" : "Nombre y Dirección exacta";
            
            // Lógica de WhatsApp: Solo marcado por defecto si es domicilio
            checkWA.checked = (tipo === 'domicilio');
        }
    </script>
</body>
</html>
