<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKU Admin | Centro de Mando</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #11141a; --sidebar-hover: #1e232d; --main-bg: #f4f7f6; --white: #ffffff; --accent: #ffcc00; --text-dark: #333333; --text-light: #8892a0; --border: #e2e8f0; --success: #28a745; --danger: #dc3545; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--main-bg); height: 100vh; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: var(--sidebar-bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        #admin-panel { display: none; width: 100%; height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--accent); }
        .nav-menu { padding: 20px 0; flex: 1; }
        .nav-item { padding: 15px 25px; color: var(--text-light); cursor: pointer; display: flex; align-items: center; gap: 10px; border-left: 4px solid transparent; }
        .nav-item.active { background: var(--sidebar-hover); color: white; border-left-color: var(--accent); }
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .topbar { background: white; height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 1px solid var(--border); }
        .content-area { padding: 30px; overflow-y: auto; flex: 1; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .card { background: white; border-radius: 12px; padding: 25px; border: 1px solid var(--border); margin-bottom: 25px; }
        .pedidos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        /* Badge para Domicilio */
        .badge { font-size: 0.65rem; padding: 3px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        .badge-mesa { background: #e0f2fe; color: #0284c7; }
        .badge-domi { background: #fef3c7; color: #d97706; }

        .pedido-card { background: white; border-radius: 10px; border: 1px solid var(--border); border-left: 6px solid var(--accent); padding: 20px; position: relative; }
        .atendido-row { display: grid; grid-template-columns: 1fr 1fr 100px; padding: 10px 20px; background: #f9fafb; border-radius: 8px; margin-bottom: 5px; font-size: 0.85rem; }
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--success); }
        input:checked + .slider:before { transform: translateX(18px); }
    </style>
</head>
<body>
    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div id="login-screen">
        <div class="login-card" style="background:white; padding:40px; border-radius:12px; text-align:center;">
            <h1>IKU</h1>
            <button id="login-btn" style="background:var(--info); color:white; border:none; padding:12px 30px; border-radius:8px; cursor:pointer; margin-top:20px;">Google Login</button>
        </div>
    </div>

    <div id="admin-panel">
        <aside class="sidebar">
            <div class="sidebar-header"><h2>IKU ADMIN</h2></div>
            <ul class="nav-menu">
                <li class="nav-item active" onclick="cambiarVista('v-pedidos', this)"><span>🔔</span> Pedidos</li>
                <li class="nav-item" onclick="cambiarVista('v-menu', this)"><span>🍔</span> Menú</li>
                <li class="nav-item" onclick="cambiarVista('v-stats', this)"><span>📊</span> Estadísticas</li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="topbar"><h3 id="t-title">Pedidos</h3><div>🟢 Conectado</div></header>
            <div class="content-area">
                <section id="v-pedidos" class="view-section active">
                    <div class="card"><h4>🔥 En Cocina</h4><div id="l-pendientes" class="pedidos-grid" style="margin-top:15px;"></div></div>
                    <div class="card"><h4>✅ Atendidos</h4><div id="l-atendidos"></div></div>
                </section>

                <section id="v-menu" class="view-section">
                    <div class="card">
                        <div style="display:flex; justify-content:space-between;">
                            <h4 id="f-title">Añadir Plato</h4>
                            <button id="close-x" style="display:none; border:none; background:none; font-size:1.5rem;" onclick="cancelarEdicion()">×</button>
                        </div>
                        <form id="m-form">
                            <input type="hidden" id="edit-id">
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:15px;">
                                <input type="text" id="name" placeholder="Nombre" required>
                                <input type="number" id="price" placeholder="Precio" required>
                                <select id="category"><option value="diario">Menú del Día</option><option value="rapida">Comidas Rápidas</option><option value="varios">Varios</option></select>
                                <input type="text" id="ingredients" placeholder="Ingredientes">
                            </div>
                            <textarea id="desc" placeholder="Descripción" style="width:100%; margin-top:10px; padding:10px; border-radius:8px; border:1px solid #ddd;"></textarea>
                            <button type="submit" id="s-btn" style="width:100%; background:var(--sidebar-bg); color:var(--accent); border:none; padding:12px; margin-top:15px; border-radius:8px; font-weight:bold; cursor:pointer;">PUBLICAR</button>
                        </form>
                    </div>
                    <div class="card" id="inv-list"></div>
                </section>

                <section id="v-stats" class="view-section">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                        <div class="card" style="background:var(--sidebar-bg); color:var(--accent);"><h5>Hoy</h5><h2 id="s-hoy">$0</h2></div>
                        <div class="card" style="background:var(--info); color:white;"><h5>Mes</h5><h2 id="s-mes">$0</h2></div>
                    </div>
                    <div class="card">
                        <h4>Rankings Mensuales</h4>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:15px;">
                            <div><h5 style="color:var(--success);">Top 5 🔥</h5><ol id="top-5" style="padding-left:20px;"></ol></div>
                            <div><h5 style="color:var(--danger);">Bajos ❄️</h5><ul id="bot-5" style="padding-left:20px;"></ul></div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script type="module" src="admin-script.js"></script>
    <script>
        function cambiarVista(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('t-title').innerText = el.innerText.trim();
        }
    </script>
</body>
</html>
