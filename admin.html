<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKU Admin | Control Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    
    <div id="login-screen" style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; background:var(--bg);">
        <div style="background:var(--white); padding:40px; border-radius:16px; box-shadow:0 4px 6px rgba(0,0,0,0.05); text-align:center;">
            <h2 style="margin-bottom: 24px; font-weight: 600; color: var(--sidebar);">Acceso Seguro</h2>
            <button id="login-btn" class="btn-action btn-primary" style="width: 100%;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                Entrar con Google
            </button>
        </div>
    </div>

    <div id="admin-panel" style="display:none;">
        <aside class="sidebar">
            <h2>IKU<span>.</span></h2>
            <div class="nav-item active" onclick="cambiarVista('v-pedidos', this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                Monitor de Pedidos
            </div>
            <div class="nav-item" onclick="cambiarVista('v-carta', this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                Gestión de Carta
            </div>
            <div class="nav-item" onclick="cambiarVista('v-mesas', this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                Plano de Mesas
            </div>
            <div class="nav-item" onclick="cambiarVista('v-stats', this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                Métricas
            </div>
            <div style="margin-top: auto;">
                <div class="nav-item" id="logout-btn" style="color: #ef4444;">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Cerrar Sesión
                </div>
            </div>
        </aside>

        <main class="main-content">
            <section id="v-pedidos" class="view-section active">
                <div style="display: flex; gap: 24px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 320px;">
                        <h3 style="margin-bottom: 20px;">Pendientes</h3>
                        <div id="l-pendientes"></div>
                    </div>
                    <div style="flex: 1; min-width: 320px;">
                        <div class="admin-group">
                            <div class="admin-group-header" onclick="toggleAtendidos()" style="color: var(--success);">
                                <span>Atendidos Hoy</span>
                                <svg id="chevron-atendidos" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                            <div id="l-atendidos" class="lista-atendidos-oculta"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="v-carta" class="view-section">
                <div style="display: flex; gap: 30px; flex-wrap: wrap-reverse;">
                    <div style="flex: 1; min-width: 320px;"><div id="inv-list"></div></div>
                    <div style="flex: 1; min-width: 320px;">
                        <form id="m-form" class="form-container">
                            <h3 id="f-title">Configurar Plato</h3>
                            <input type="hidden" id="edit-id">
                            <input type="text" id="name" placeholder="Nombre" required>
                            <input type="number" id="price" placeholder="Precio" required>
                            <select id="category" required>
                                <option value="diario">Menú del Día</option>
                                <option value="rapida">Comidas Rápidas</option>
                                <option value="varios">Varios</option>
                            </select>
                            <textarea id="desc" placeholder="Descripción"></textarea>
                            <input type="text" id="ingredients" placeholder="Ingredientes (coma)">
                            <button type="submit" class="btn-action btn-primary">Guardar</button>
                            <button type="button" onclick="cancelarEdicion()" id="btn-cancelar" class="btn-action btn-outline" style="display:none;">Cancelar</button>
                        </form>
                    </div>
                </div>
            </section>

            <section id="v-mesas" class="view-section">
                <h3 style="margin-bottom: 24px;">Plano de Mesas</h3>
                <div id="grid-mesas" class="mesas-container"></div>
            </section>

            <section id="v-stats" class="view-section">
                <h3 style="margin-bottom: 24px;">Métricas</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                    <div class="stat-card">Ventas Hoy <strong id="s-hoy">$0</strong></div>
                    <div class="stat-card">Ventas Mes <strong id="s-mes">$0</strong></div>
                </div>
                <div id="rankings-categoria" style="margin-top:20px;"></div>
            </section>
        </main>
    </div>

    <script type="module" src="admin-script.js"></script>
    <script>
        function cambiarVista(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function toggleAtendidos() {
            document.getElementById('l-atendidos').classList.toggle('lista-atendidos-oculta');
        }
    </script>
</body>
</html>
