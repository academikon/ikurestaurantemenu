<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración | IKU</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #1a1a1a; color: white; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; color: #333; padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        h2 { border-bottom: 2px solid #ffcc00; padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-save { background: #ffcc00; border: none; padding: 15px; font-weight: bold; width: 100%; cursor: pointer; border-radius: 6px; text-transform: uppercase; }
        .btn-google { background: #4285F4; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; border-radius: 6px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #admin-panel { display: none; }
        .user-info { font-size: 0.8rem; color: #666; margin-bottom: 20px; text-align: right; }
    </style>
</head>
<body>

    <div class="card">
        <div id="login-screen">
            <h2>IKU Global Admin</h2>
            <p style="text-align:center; color:#666; margin-bottom:20px;">Acceso exclusivo para personal autorizado.</p>
            <button class="btn-google" id="login-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Entrar con Google
            </button>
        </div>

        <div id="admin-panel">
            <div class="user-info" id="user-tag"></div>
            <h2>Gestionar Menú</h2>
            <form id="menu-form">
                <label>Nombre del Plato</label>
                <input type="text" id="name" placeholder="Ej: Tacos al Pastor" required>
                
                <label>Precio (Solo números)</label>
                <input type="number" id="price" placeholder="Ej: 18500" required>
                
                <label>Categoría</label>
                <select id="category">
                    <option value="diario">Menú del Día</option>
                    <option value="rapida">Comidas Rápidas</option>
                    <option value="varios">Varios</option>
                </select>
                
                <label>Descripción</label>
                <textarea id="desc" rows="3" placeholder="Describe el sabor del plato..."></textarea>
                
                <label>Ingredientes (Separados por coma)</label>
                <input type="text" id="ingredients" placeholder="Ej: Tortilla, Cerdo, Piña, Cilantro">
                
                <button type="submit" class="btn-save">Publicar en el Menú</button>
            </form>
            <br>
            <button onclick="logout()" style="width:100%; background:none; border:none; color:#d9534f; cursor:pointer; font-size:0.9rem;">Cerrar Sesión</button>
        </div>
    </div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // LISTA BLANCA DE CORREOS
        const correosAutorizados = [
            "cb01grupo@gmail.com", 
            "kelly.araujotafur@gmail.com"
        ];

        const loginBtn = document.getElementById('login-btn');
        const adminPanel = document.getElementById('admin-panel');
        const loginScreen = document.getElementById('login-screen');
        const userTag = document.getElementById('user-tag');

        // Función Entrar
        loginBtn.onclick = () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).catch(err => alert("Error: " + err.message));
        };

        // Función Salir
        window.logout = () => signOut(auth);

        // Vigilante de Sesión
        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (correosAutorizados.includes(user.email)) {
                    // Acceso permitido
                    adminPanel.style.display = 'block';
                    loginScreen.style.display = 'none';
                    userTag.innerText = "Conectado como: " + user.email;
                } else {
                    // Intento fallido
                    alert("Acceso denegado: " + user.email + " no tiene permisos.");
                    signOut(auth);
                }
            } else {
                adminPanel.style.display = 'none';
                loginScreen.style.display = 'block';
            }
        });

        // Guardar en la Base de Datos
        document.getElementById('menu-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, "platos"), {
                    nombre: document.getElementById('name').value,
                    precio: document.getElementById('price').value,
                    categoria: document.getElementById('category').value,
                    descripcion: document.getElementById('desc').value,
                    ingredientes: document.getElementById('ingredients').value.split(','),
                    timestamp: serverTimestamp()
                });
                alert("¡Plato guardado exitosamente!");
                e.target.reset();
            } catch (err) {
                alert("Error al guardar: " + err.message);
            }
        });
    </script>
</body>
</html>
