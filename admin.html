<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKU Admin | Control Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    
    <div id="login-screen" style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; background:var(--bg);">
        <div style="background:var(--white); padding:40px; border-radius:16px; box-shadow:0 4px 6px rgba(0,0,0,0.05); text-align:center;">
            <h2 style="margin-bottom: 24px; font-weight: 600; color: var(--sidebar);">Acceso Seguro</h2>
            <button id="login-btn" class="btn-action btn-primary" style="width: 100%;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                Entrar con Google
            </button>
        </div>
    </div>

    <div id="admin-panel" style="display:none;">
        <aside class="sidebar">
            <h2>IKU<span>.</span></h2>
            <div class="nav-item active" onclick="cambiarVista('v-pedidos', this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span>Monitor</span>
            </div>
            <div class="nav-item" onclick="cambiarVista('v-carta', this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                <span>Carta</span>
            </div>
            <div class="nav-item" onclick="cambiarVista('v-mesas', this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                <span>Mesas</span>
            </div>
            <div class="nav-item" onclick="cambiarVista('v-stats', this)">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span>Métricas</span>
            </div>
            <div class="nav-logout-container">
                <div class="nav-item" id="logout-btn" style="color: #ef4444;">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span>Salir</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <section id="v-pedidos" class="view-section active">
                <div class="responsive-flex">
                    <div style="flex: 1; min-width: 300px;">
                        <h3 style="margin-bottom: 20px;">Pendientes</h3>
                        <div id="l-pendientes"></div>
                    </div>
                    <div style="flex: 1; min-width: 300px;">
                        <div class="admin-group">
                            <div class="admin-group-header" onclick="toggleAtendidos()" style="color: var(--success); cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
                                <span>Atendidos Hoy</span>
                                <svg id="chevron-atendidos" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition: transform 0.3s;"><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                            <div id="l-atendidos" class="lista-atendidos-oculta" style="margin-top: 15px;"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="v-carta" class="view-section">
                <div class="responsive-flex-reverse">
                    <div style="flex: 1; min-width: 300px;">
                        <h3 style="margin-bottom: 20px;">Menú Activo</h3>
                        <div id="inv-list"></div>
                    </div>
                    <div style="flex: 1; min-width: 300px;">
                        <div class="form-container sticky-form">
                            <h3 id="f-title" style="margin-bottom: 24px;">Configurar Plato</h3>
                            <form id="m-form" style="display: flex; flex-direction: column; gap: 16px;">
                                <input type="hidden" id="edit-id">
                                <input type="text" id="name" placeholder="Nombre del plato" required>
                                <div class="form-row">
                                    <input type="number" id="price" placeholder="Precio" required style="flex: 1;">
                                    <select id="category" required style="flex: 1;">
                                        <option value="" disabled selected>Categoría...</option>
                                        <option value="diario">Menú del Día</option>
                                        <option value="rapida">Comidas Rápidas</option>
                                        <option value="varios">Varios</option>
                                    </select>
                                </div>
                                <textarea id="desc" placeholder="Descripción breve" style="height: 70px;"></textarea>
                                <input type="text" id="ingredients" placeholder="Ingredientes (cebolla, tomate...)">
                                <div style="display: flex; gap: 12px;">
                                    <button type="submit" class="btn-action btn-primary" style="flex: 2;">Guardar Plato</button>
                                    <button type="button" onclick="cancelarEdicion()" id="btn-cancelar" class="btn-action btn-outline" style="display: none; flex: 1;">Cancelar</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </section>

            <section id="v-mesas" class="view-section">
                <h3 style="margin-bottom: 24px;">Plano de Mesas</h3>
                <div id="grid-mesas" class="mesas-container"></div>
            </section>

            <section id="v-stats" class="view-section">
                <h3 style="margin-bottom: 24px;">Resumen Financiero</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div style="font-size: 0.85rem; color: var(--text-muted);">Ventas Hoy</div>
                        <strong id="s-hoy" style="font-size: 1.8rem;">$0</strong>
                    </div>
                    <div class="stat-card">
                        <div style="font-size: 0.85rem; color: var(--text-muted);">Ventas Mes</div>
                        <strong id="s-mes" style="font-size: 1.8rem;">$0</strong>
                    </div>
                    <div class="stat-card">
                        <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px;">Métodos (Hoy)</div>
                        <div style="font-size: 0.8rem; display:flex; flex-direction:column; gap:4px;">
                            <div style="display:flex; justify-content:space-between;"><span>Nequi:</span> <strong id="s-nequi">$0</strong></div>
                            <div style="display:flex; justify-content:space-between;"><span>Banco:</span> <strong id="s-bancolombia">$0</strong></div>
                            <div style="display:flex; justify-content:space-between;"><span>Efec:</span> <strong id="s-efectivo">$0</strong></div>
                        </div>
                    </div>
                </div>

                <div id="super-admin-zone" style="display: none; margin-top: 40px; padding: 20px; border-top: 2px dashed var(--border); text-align: center;">
                    <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 15px;">Acceso Principal: Dagoberto</p>
                    <button onclick="resetearEstadisticas()" class="btn-action" style="background: var(--danger); color: white; border: none; padding: 12px 24px; font-weight: 600;">
                        REINICIAR TODAS LAS MÉTRICAS
                    </button>
                </div>
            </section>
        </main>
    </div>

    <div id="delete-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter: blur(4px); justify-content:center; align-items:center; z-index:2000;">
        <div style="background:white; padding:32px; border-radius:16px; text-align:center; max-width:400px; width:90%;">
            <h3 id="modal-title" style="margin-bottom:24px;">¿Confirmar acción?</h3>
            <div style="display:flex; gap:12px;">
                <button onclick="closeModal()" class="btn-action btn-outline" style="flex:1;">Cancelar</button>
                <button id="confirm-delete-btn" class="btn-action" style="flex:1; background:var(--danger); color:white; border:none;">Confirmar</button>
            </div>
        </div>
    </div>

    <script type="module" src="admin-script.js"></script>
    <script>
        function cambiarVista(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            // En móvil, hacer scroll hacia arriba al cambiar de vista
            if(window.innerWidth <= 768) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
        function toggleAtendidos() {
            const l = document.getElementById('l-atendidos');
            const c = document.getElementById('chevron-atendidos');
            l.classList.toggle('lista-atendidos-oculta');
            c.style.transform = l.classList.contains('lista-atendidos-oculta') ? 'rotate(0deg)' : 'rotate(180deg)';
        }
        function closeModal() { document.getElementById('delete-modal').style.display = 'none'; }
    </script>
</body>
</html>
