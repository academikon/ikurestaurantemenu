<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKU Admin | Control y Estadísticas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --sidebar: #0f1115; --accent: #ffcc00; --bg: #f4f7f6; --white: #ffffff; --success: #28a745; --danger: #dc3545; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); display: flex; height: 100vh; }
        
        #login-screen { position: fixed; inset: 0; background: var(--sidebar); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { background: var(--white); padding: 40px; border-radius: 15px; text-align: center; }
        
        #admin-panel { display: none; width: 100%; height: 100vh; display: flex; }
        .sidebar { width: 240px; background: var(--sidebar); color: white; display: flex; flex-direction: column; padding: 20px 0; }
        .sidebar h2 { color: var(--accent); text-align: center; margin-bottom: 30px; }
        .nav-item { padding: 15px 25px; cursor: pointer; color: #a0a0a0; transition: 0.3s; border-left: 4px solid transparent; }
        .nav-item.active { background: #1a1d23; color: white; border-left-color: var(--accent); }
        
        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        
        .card { background: white; border-radius: 12px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { padding: 20px; border-radius: 12px; color: white; }

        /* Inventario */
        .admin-group { margin-bottom: 25px; }
        .admin-group-title { background: #f8f9fa; padding: 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; border-left: 4px solid var(--accent); margin-bottom: 10px; }
        .admin-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }

        /* Tablas */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 10px; font-size: 0.8rem; color: #777; border-bottom: 2px solid #eee; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f1f1; font-size: 0.9rem; }

        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: var(--success); }
        input:checked + .slider:before { transform: translateX(18px); }

        .btn-ready { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div id="login-screen">
        <div class="login-card"><h1>IKU ADMIN</h1><button id="login-btn">INGRESAR</button></div>
    </div>

    <div id="admin-panel">
        <aside class="sidebar">
            <h2>IKU</h2>
            <div class="nav-item active" onclick="cambiarVista('v-pedidos', this)">🔔 Pedidos</div>
            <div class="nav-item" onclick="cambiarVista('v-menu', this)">🍔 Inventario</div>
            <div class="nav-item" onclick="cambiarVista('v-stats', this)">📊 Estadísticas</div>
            <div style="margin-top:auto; padding:20px;"><button onclick="auth.signOut()" style="color:red; background:none; border:none; cursor:pointer;">Cerrar Sesión</button></div>
        </aside>

        <main class="main-content">
            <section id="v-pedidos" class="view-section active">
                <h3>Pedidos del Día</h3>
                <div id="l-pendientes" style="margin-top:20px;"></div>
                <h3 style="margin-top:40px; color:#777;">Despachados Hoy</h3>
                <div id="l-atendidos"></div>
            </section>

            <section id="v-menu" class="view-section">
                <div class="card">
                    <h3 id="f-title">Gestión de Platos</h3>
                    <form id="m-form" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <input type="hidden" id="edit-id">
                        <input type="text" id="name" placeholder="Nombre" required>
                        <input type="number" id="price" placeholder="Precio" required>
                        <select id="category"><option value="diario">Menú del Día</option><option value="rapida">Comidas Rápidas</option><option value="varios">Varios</option></select>
                        <input type="text" id="ingredients" placeholder="Ingredientes (comas)">
                        <textarea id="desc" placeholder="Descripción" style="grid-column: span 2;"></textarea>
                        <button type="submit" id="s-btn" style="grid-column: span 2; background:var(--sidebar); color:var(--accent); padding:10px; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">GUARDAR</button>
                    </form>
                </div>
                <div id="inv-list" class="card"></div>
            </section>

            <section id="v-stats" class="view-section">
                <div class="stats-grid">
                    <div class="stat-card" style="background:var(--sidebar); border-bottom: 4px solid var(--accent);">
                        <p style="font-size:0.8rem; opacity:0.8;">Ventas Hoy</p>
                        <h2 id="s-hoy">$0</h2>
                    </div>
                    <div class="stat-card" style="background:var(--success);">
                        <p style="font-size:0.8rem; opacity:0.8;">Ventas del Mes</p>
                        <h2 id="s-mes">$0</h2>
                    </div>
                </div>

                <div class="card">
                    <h3>🏆 Favoritos por Sección (Este Mes)</h3>
                    <div id="rankings-categoria" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-top:15px;">
                        </div>
                </div>

                <div class="card">
                    <h3>📅 Historial Mensual</h3>
                    <table>
                        <thead><tr><th>Mes</th><th>Venta Total</th><th>Plato más vendido</th></tr></thead>
                        <tbody id="historial-meses"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="admin-script.js"></script>
    <script>
        function cambiarVista(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
